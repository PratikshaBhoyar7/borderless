<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Testing Dashboard - Borderless Analytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }

        .header h1 {
            color: #4facfe;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #4facfe;
            color: white;
        }

        .btn-primary:hover {
            background: #2080e0;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            background: #252526;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #4facfe;
        }

        .status-item {
            flex: 1;
        }

        .status-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: bold;
        }

        .status-value.success {
            color: #51cf66;
        }

        .status-value.error {
            color: #ff6b6b;
        }

        .status-value.pending {
            color: #ffa94d;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .test-card {
            background: #252526;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            transition: all 0.3s;
        }

        .test-card:hover {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.2);
        }

        .test-card.success {
            border-left: 4px solid #51cf66;
        }

        .test-card.error {
            border-left: 4px solid #ff6b6b;
        }

        .test-card.pending {
            border-left: 4px solid #ffa94d;
        }

        .test-name {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .test-details {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .test-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .status-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-icon.success {
            background: #51cf66;
        }

        .status-icon.error {
            background: #ff6b6b;
        }

        .status-icon.pending {
            background: #ffa94d;
        }

        .log-section {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-title {
            color: #4facfe;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .log-line {
            font-size: 12px;
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid transparent;
            padding-left: 8px;
        }

        .log-line.info {
            color: #4facfe;
            border-left-color: #4facfe;
        }

        .log-line.success {
            color: #51cf66;
            border-left-color: #51cf66;
        }

        .log-line.error {
            color: #ff6b6b;
            border-left-color: #ff6b6b;
        }

        .log-line.warning {
            color: #ffa94d;
            border-left-color: #ffa94d;
        }

        .results-section {
            background: #252526;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .results-title {
            color: #4facfe;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-key {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .result-value {
            color: #e0e0e0;
            font-size: 13px;
            word-break: break-all;
            background: #1e1e1e;
            padding: 8px;
            border-radius: 3px;
            margin-bottom: 5px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #4facfe;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .summary {
            background: #252526;
            border: 2px solid #4facfe;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .summary-title {
            color: #4facfe;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-row.total {
            font-weight: bold;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .summary-number {
            font-weight: bold;
        }

        .endpoint-detail {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 3px;
            font-size: 11px;
            margin-top: 8px;
        }

        .endpoint-url {
            color: #51cf66;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .endpoint-response {
            color: #999;
            margin-top: 5px;
            max-height: 100px;
            overflow-y: auto;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2080e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 API Testing Dashboard</h1>
            <p>Comprehensive testing for Borderless Analytics Endpoints</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Server Status</div>
                <div class="status-value" id="serverStatus">Checking...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Authentication</div>
                <div class="status-value" id="authStatus">Pending</div>
            </div>
            <div class="status-item">
                <div class="status-label">Endpoints Tested</div>
                <div class="status-value" id="testCount">0/0</div>
            </div>
            <div class="status-item">
                <div class="status-label">Overall Status</div>
                <div class="status-value pending" id="overallStatus">Pending</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="runAllTests()">
                🚀 Run All Tests
            </button>
            <button class="btn btn-success" onclick="runQuickTest()">
                ⚡ Quick Test (Auth + 1 Endpoint)
            </button>
            <button class="btn btn-danger" onclick="clearTests()">
                🗑️ Clear Results
            </button>
        </div>

        <div class="log-section">
            <div class="log-title">📋 Test Log</div>
            <div id="logContainer"></div>
        </div>

        <div id="testCardsContainer" class="test-grid"></div>

        <div id="summaryContainer"></div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        const CONFIG = {
            BASE_URL: 'http://localhost:8000',
            LOGIN_EMAIL: 'admin@admin.com',
            LOGIN_PASSWORD: 'password',
            TIMEOUT: 10000
        };

        const state = {
            authenticated: false,
            results: {},
            logs: [],
            testsPassed: 0,
            testsFailed: 0
        };

        // Logging
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = { timestamp, message, type };
            state.logs.push(logEntry);

            const logContainer = document.getElementById('logContainer');
            const logLine = document.createElement('div');
            logLine.className = `log-line ${type}`;
            logLine.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logLine);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Fetch with timeout
        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);

            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // Extract CSRF token
        function extractCsrfToken(html) {
            const match = html.match(/name="_token"\s+value="([^"]+)"/);
            return match ? match[1] : null;
        }

        // Test server connectivity
        async function testConnectivity() {
            addLog('Testing server connectivity...', 'info');
            try {
                const response = await fetchWithTimeout(`${CONFIG.BASE_URL}/`);
                if (response.ok) {
                    addLog(`✓ Server is accessible`, 'success');
                    updateStatus('serverStatus', 'Online', 'success');
                    return true;
                }
            } catch (error) {
                addLog(`✗ Cannot reach server: ${error.message}`, 'error');
                updateStatus('serverStatus', 'Offline', 'error');
                return false;
            }
        }

        // Authenticate
        async function authenticate() {
            addLog('Authenticating...', 'info');
            try {
                // Get CSRF token
                const loginPageResponse = await fetchWithTimeout(`${CONFIG.BASE_URL}/login`);
                const loginPageHtml = await loginPageResponse.text();
                const csrfToken = extractCsrfToken(loginPageHtml);

                if (!csrfToken) {
                    throw new Error('Could not extract CSRF token');
                }

                addLog('✓ CSRF token extracted', 'success');

                // Login
                const loginFormData = new FormData();
                loginFormData.append('email', CONFIG.LOGIN_EMAIL);
                loginFormData.append('password', CONFIG.LOGIN_PASSWORD);
                loginFormData.append('_token', csrfToken);

                const loginResponse = await fetchWithTimeout(`${CONFIG.BASE_URL}/login`, {
                    method: 'POST',
                    credentials: 'include',
                    body: loginFormData
                });

                if (loginResponse.ok || loginResponse.status === 302) {
                    addLog(`✓ Authentication successful`, 'success');
                    updateStatus('authStatus', 'Authenticated', 'success');
                    state.authenticated = true;
                    return true;
                } else {
                    throw new Error(`Login failed with status ${loginResponse.status}`);
                }
            } catch (error) {
                addLog(`✗ Authentication failed: ${error.message}`, 'error');
                updateStatus('authStatus', 'Failed', 'error');
                return false;
            }
        }

        // Test endpoint
        async function testEndpoint(name, endpoint, params = {}) {
            try {
                const url = new URL(`${CONFIG.BASE_URL}${endpoint}`);
                Object.entries(params).forEach(([key, value]) => {
                    if (value) url.searchParams.append(key, value);
                });

                addLog(`Testing: ${name}`, 'info');

                const response = await fetchWithTimeout(url.toString(), {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                if (response.status === 401) {
                    throw new Error('Unauthorized (401)');
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                }

                const data = await response.json();
                const itemCount = Array.isArray(data) ? data.length : Object.keys(data).length;

                addLog(`✓ ${name} - Received ${itemCount} items`, 'success');

                state.results[name] = {
                    status: 'success',
                    code: response.status,
                    itemCount: itemCount,
                    endpoint: endpoint
                };

                state.testsPassed++;
                return true;
            } catch (error) {
                addLog(`✗ ${name} - ${error.message}`, 'error');
                state.results[name] = {
                    status: 'error',
                    message: error.message,
                    endpoint: endpoint
                };
                state.testsFailed++;
                return false;
            }
        }

        // Update status display
        function updateStatus(elementId, value, type) {
            const element = document.getElementById(elementId);
            element.textContent = value;
            element.className = `status-value ${type}`;
        }

        // Render test results
        function renderResults() {
            const container = document.getElementById('testCardsContainer');
            container.innerHTML = '';

            Object.entries(state.results).forEach(([name, result]) => {
                const card = document.createElement('div');
                card.className = `test-card ${result.status}`;

                let statusIcon = '🔄';
                let statusText = 'Pending';

                if (result.status === 'success') {
                    statusIcon = '✓';
                    statusText = `200 OK (${result.itemCount} items)`;
                } else if (result.status === 'error') {
                    statusIcon = '✗';
                    statusText = result.message;
                }

                card.innerHTML = `
                    <div class="test-name">${statusIcon} ${name}</div>
                    <div class="test-details">${result.endpoint}</div>
                    <div class="test-status">
                        <span class="status-icon ${result.status}"></span>
                        <span>${statusText}</span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Render summary
        function renderSummary() {
            const total = state.testsPassed + state.testsFailed;
            const passRate = total > 0 ? Math.round((state.testsPassed / total) * 100) : 0;

            const container = document.getElementById('summaryContainer');
            const overallStatus = state.testsFailed === 0 ? 'success' : 'error';

            container.innerHTML = `
                <div class="summary">
                    <div class="summary-title">📊 Test Summary</div>
                    <div class="summary-row total">
                        <span>Total Tests:</span>
                        <span class="summary-number">${total}</span>
                    </div>
                    <div class="summary-row">
                        <span>✓ Passed:</span>
                        <span class="summary-number" style="color: #51cf66;">${state.testsPassed}</span>
                    </div>
                    <div class="summary-row">
                        <span>✗ Failed:</span>
                        <span class="summary-number" style="color: #ff6b6b;">${state.testsFailed}</span>
                    </div>
                    <div class="summary-row">
                        <span>Pass Rate:</span>
                        <span class="summary-number" style="color: #4facfe;">${passRate}%</span>
                    </div>
                </div>
            `;

            updateStatus('testCount', `${state.testsPassed}/${total}`, 'pending');
            updateStatus('overallStatus', state.testsFailed === 0 ? 'All Passed' : 'Some Failed', overallStatus);
        }

        // Run quick test
        async function runQuickTest() {
            clearTests();
            addLog('Starting quick test...', 'info');

            if (!await testConnectivity()) return;
            if (!await authenticate()) return;

            await testEndpoint('Stats (No Filter)', '/admin/analytics/api/stats', {});

            renderResults();
            renderSummary();
        }

        // Run all tests
        async function runAllTests() {
            clearTests();
            addLog('Starting comprehensive test suite...', 'info');

            if (!await testConnectivity()) return;
            if (!await authenticate()) return;

            const tests = [
                { name: 'Stats (No Filter)', endpoint: '/admin/analytics/api/stats', params: {} },
                { name: 'Stats (Gender: Male)', endpoint: '/admin/analytics/api/stats', params: { gender: 'Male' } },
                { name: 'Stats (Gender: Female)', endpoint: '/admin/analytics/api/stats', params: { gender: 'Female' } },
                { name: 'Stats (Age: 18-30)', endpoint: '/admin/analytics/api/stats', params: { age_group: '18-30' } },
                { name: 'Demographics', endpoint: '/admin/analytics/api/demographics', params: {} },
                { name: 'Demographics (Gender: Male)', endpoint: '/admin/analytics/api/demographics', params: { gender: 'Male' } },
                { name: 'Health Metrics', endpoint: '/admin/analytics/api/health-metrics', params: {} },
                { name: 'Health Metrics (Age: 60+)', endpoint: '/admin/analytics/api/health-metrics', params: { age_group: '60+' } },
                { name: 'Patients (Page 1)', endpoint: '/admin/analytics/api/patients', params: { page: 1, per_page: 10 } },
                { name: 'Patients (Page 2)', endpoint: '/admin/analytics/api/patients', params: { page: 2, per_page: 10 } },
                { name: 'Patients (Gender: Female)', endpoint: '/admin/analytics/api/patients', params: { gender: 'Female', page: 1, per_page: 10 } },
                { name: 'States', endpoint: '/admin/analytics/api/states/1', params: {} },
                { name: 'Districts', endpoint: '/admin/analytics/api/districts/1', params: {} },
                { name: 'Talukas', endpoint: '/admin/analytics/api/talukas/1', params: {} }
            ];

            for (const test of tests) {
                await testEndpoint(test.name, test.endpoint, test.params);
                await new Promise(resolve => setTimeout(resolve, 100)); // Small delay between tests
            }

            renderResults();
            renderSummary();
            addLog('✓ All tests completed', 'success');
        }

        // Clear tests
        function clearTests() {
            state.logs = [];
            state.results = {};
            state.testsPassed = 0;
            state.testsFailed = 0;

            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('testCardsContainer').innerHTML = '';
            document.getElementById('summaryContainer').innerHTML = '';

            updateStatus('testCount', '0/0', 'pending');
            updateStatus('overallStatus', 'Pending', 'pending');

            addLog('Test results cleared', 'info');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            addLog('Test dashboard initialized', 'success');
            addLog(`API Base URL: ${CONFIG.BASE_URL}`, 'info');
            addLog('Ready to run tests. Click "Run All Tests" to start.', 'info');
        });
    </script>
</body>
</html>
